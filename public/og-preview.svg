<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38f2b0" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#38f2b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c77dff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c77dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eafbf1"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="rgba(124,255,178,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#05070a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="150" cy="120" r="360" fill="url(#glow1)"/>
  <circle cx="1080" cy="520" r="380" fill="url(#glow2)"/>

  <rect x="56" y="56" width="1088" height="518" rx="32" fill="none" stroke="rgba(124,255,178,0.22)" stroke-width="1.5"/>
  <!-- corner brackets -->
  <path d="M56 100V64H92" fill="none" stroke="#7cffb2" stroke-width="3"/>
  <path d="M1144 530V566H1108" fill="none" stroke="#7cffb2" stroke-width="3"/>

  <!-- OX mark -->
  <g transform="translate(96,138)">
    <polygon points="55.4,45.5 32,59 8.6,45.5 8.6,18.5 32,5 55.4,18.5" fill="none" stroke="#7cffb2" stroke-width="2.6" stroke-linejoin="round" transform="scale(2.7)"/>
    <g stroke="#7cffb2" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" transform="scale(2.7)">
      <line x1="18" y1="18" x2="46" y2="46"/>
      <line x1="46" y1="18" x2="18" y2="46"/>
      <circle cx="18" cy="18" r="3.2" fill="#7cffb2" stroke="none"/>
      <circle cx="46" cy="18" r="3.2" fill="#7cffb2" stroke="none"/>
      <circle cx="18" cy="46" r="3.2" fill="#7cffb2" stroke="none"/>
      <circle cx="46" cy="46" r="3.2" fill="#7cffb2" stroke="none"/>
      <circle cx="32" cy="32" r="3.6" fill="#7cffb2" stroke="none"/>
    </g>
  </g>

  <text x="96" y="360" fill="#7cffb2" font-size="26" font-family="'JetBrains Mono', monospace" letter-spacing="6">OBIXCONFIG FPV</text>
  <text x="96" y="425" fill="url(#wordGrad)" font-size="58" font-family="'Space Grotesk', Inter, Arial, sans-serif" font-weight="700">Read your build like an OSD,</text>
  <text x="96" y="490" fill="url(#wordGrad)" font-size="58" font-family="'Space Grotesk', Inter, Arial, sans-serif" font-weight="700">not a spreadsheet.</text>
  <text x="96" y="535" fill="#8aa397" font-size="24" font-family="Inter, Arial, sans-serif">PID tuning · Blackbox analysis · Build matching · Flight readiness</text>

  <!-- instrument color strip -->
  <g transform="translate(96,565)">
    <rect x="0" y="0" width="70" height="8" rx="4" fill="#38f2b0"/>
    <text x="0" y="28" fill="#8aa397" font-size="14" font-family="JetBrains Mono, monospace" letter-spacing="1">PID</text>
    <rect x="92" y="0" width="70" height="8" rx="4" fill="#c77dff"/>
    <text x="92" y="28" fill="#8aa397" font-size="14" font-family="JetBrains Mono, monospace" letter-spacing="1">BBX</text>
    <rect x="184" y="0" width="70" height="8" rx="4" fill="#4fd1ff"/>
    <text x="184" y="28" fill="#8aa397" font-size="14" font-family="JetBrains Mono, monospace" letter-spacing="1">BLD</text>
    <rect x="276" y="0" width="70" height="8" rx="4" fill="#a6ff4d"/>
    <text x="276" y="28" fill="#8aa397" font-size="14" font-family="JetBrains Mono, monospace" letter-spacing="1">RTE</text>
    <rect x="368" y="0" width="70" height="8" rx="4" fill="#ffcf5c"/>
    <text x="368" y="28" fill="#8aa397" font-size="14" font-family="JetBrains Mono, monospace" letter-spacing="1">CHK</text>
    <rect x="460" y="0" width="70" height="8" rx="4" fill="#ff9d4d"/>
    <text x="460" y="28" fill="#8aa397" font-size="14" font-family="JetBrains Mono, monospace" letter-spacing="1">PRE</text>
  </g>
</svg>